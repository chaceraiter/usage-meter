<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>usage-meter</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <!-- Usage display (default view) -->
    <main class="widget" id="usage-view">
      <div class="header-row" data-tauri-drag-region>
        <h1 class="title" data-tauri-drag-region>usage-meter</h1>
        <button class="gear-btn" id="open-settings" aria-label="Settings">⚙</button>
      </div>

      <section class="provider" id="claude-section">
        <h2 class="provider-name">Claude</h2>
        <div class="row">
          <span class="label">5 hr</span>
          <span class="value" id="claude-5h">—</span>
        </div>
        <div class="row">
          <span class="label">Weekly</span>
          <span class="value" id="claude-weekly">—</span>
        </div>
      </section>

      <section class="provider" id="chatgpt-section">
        <h2 class="provider-name">ChatGPT Codex</h2>
        <div class="row">
          <span class="label">5 hr</span>
          <span class="value" id="chatgpt-5h">—</span>
        </div>
        <div class="row">
          <span class="label">Weekly</span>
          <span class="value" id="chatgpt-weekly">—</span>
        </div>
      </section>

      <p id="status" class="status">waiting for data…</p>
    </main>

    <!-- Settings view (hidden by default) -->
    <div class="widget settings" id="settings-view" style="display: none">
      <div class="header-row" data-tauri-drag-region>
        <h1 class="title" data-tauri-drag-region>settings</h1>
        <button class="gear-btn" id="close-settings" aria-label="Back">✕</button>
      </div>

      <section class="auth-section">
        <h2 class="provider-name">Claude</h2>
        <div id="claude-auth-status">
          <div class="auth-connected" id="claude-connected" style="display: none">
            <span class="auth-label">Connected</span>
            <button class="btn btn-disconnect" data-provider="claude">Disconnect</button>
          </div>
          <div class="auth-disconnected" id="claude-disconnected">
            <button class="btn btn-signin" data-provider="claude">Sign in with Claude</button>
            <button class="btn btn-fallback-toggle" data-provider="claude">paste cookie</button>
          </div>
          <div class="auth-form" id="claude-form" style="display: none">
            <input
              type="password"
              class="cookie-input"
              id="claude-cookie"
              placeholder="Paste sessionKey cookie…"
              autocomplete="off"
            />
            <button class="btn btn-connect" id="claude-connect-btn">Save</button>
          </div>
        </div>
        <p class="auth-error" id="claude-error"></p>
      </section>

      <section class="auth-section">
        <h2 class="provider-name">ChatGPT Codex</h2>
        <div id="chatgpt-auth-status">
          <div class="auth-connected" id="chatgpt-connected" style="display: none">
            <span class="auth-label">Connected</span>
            <button class="btn btn-disconnect" data-provider="chatgpt">Disconnect</button>
          </div>
          <div class="auth-disconnected" id="chatgpt-disconnected">
            <button class="btn btn-signin" data-provider="chatgpt">Sign in with ChatGPT</button>
            <button class="btn btn-fallback-toggle" data-provider="chatgpt">paste cookie</button>
          </div>
          <div class="auth-form" id="chatgpt-form" style="display: none">
            <input
              type="password"
              class="cookie-input"
              id="chatgpt-cookie"
              placeholder="Paste cookie…"
              autocomplete="off"
            />
            <button class="btn btn-connect" id="chatgpt-connect-btn">Save</button>
          </div>
        </div>
        <p class="auth-error" id="chatgpt-error"></p>
      </section>
    </div>
  </body>
</html>
